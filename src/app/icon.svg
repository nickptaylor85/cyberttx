<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b89a"/>
      <stop offset="50%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#0a7c6e"/>
    </linearGradient>
    <filter id="g">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Dark rounded square -->
  <rect width="120" height="120" rx="26" fill="#0a0a1a"/>
  
  <!-- Subtle grid -->
  <pattern id="grid" width="12" height="12" patternUnits="userSpaceOnUse">
    <path d="M 12 0 L 0 0 0 12" fill="none" stroke="rgba(20,184,154,0.04)" stroke-width="0.5"/>
  </pattern>
  <rect width="120" height="120" rx="26" fill="url(#grid)"/>
  
  <!-- Shield -->
  <path d="M60 18C51 27 41 32 28 32c0 0-2 26 6 42s18 25 26 30c8-5 18-14 26-30s6-42 6-42c-13 0-23-5-32-14z" 
        fill="url(#sg)" filter="url(#g)"/>
  
  <!-- Signal arcs -->
  <path d="M82 52 Q95 52 100 38" fill="none" stroke="#14b89a" stroke-width="2.2" opacity="0.6" stroke-linecap="round"/>
  <path d="M84 62 Q101 62 108 44" fill="none" stroke="#14b89a" stroke-width="1.6" opacity="0.35" stroke-linecap="round"/>
  <path d="M85 72 Q106 72 114 50" fill="none" stroke="#14b89a" stroke-width="1.1" opacity="0.18" stroke-linecap="round"/>
  
  <!-- Checkmark -->
  <path d="M48 58 L56 66 L74 46" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
